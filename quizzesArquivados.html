<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Quizzes Arquivados</title>

  <link rel="stylesheet" href="src/css/style.css" />
</head>

<body>

  <header class="gt-header gt-header--compact">

   <a href="dashboard.html" class="gt-brand">

      <img
        src="./img/logo sem texto.jpg"
        alt="Logo da Gamify Training"
        class="gt-brand__logo"
      >

      <div class="gt-brand__text">
        <strong>Gamify Training</strong>
        <span>Painel da plataforma</span>
      </div>

    </a>

    <nav class="gt-nav">
      <a href="gerente.html">Painel</a>
      <a href="leaderboard.html">Ranking</a>

    <div class="gt-header__actions">
      <button

        onclick="window.location.href='gerente.html'"

  <main class="dashboard">

  <script
    type="module"
